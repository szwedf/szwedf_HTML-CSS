<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>予約 | HOTEL AURELIA TOKYO（デモ）</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600&family=Noto+Serif+JP:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/hotelstyle.css" />

  <!-- flatpickr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
</head>
<body>
  <a href="#main" class="skip">本文へスキップ</a>

  <header>
    <div class="container nav" role="navigation" aria-label="トップナビ">
      <div class="brand"><a href="top.html">HOTEL AURELIA TOKYO</a></div>
      <nav class="menu" aria-label="メニュー">
        <a href="top.html#rooms">客室・スイート</a>
        <a href="top.html#dining">ダイニング</a>
        <a href="top.html#spa">スパ</a>
        <a href="top.html#access">アクセス</a>
      </nav>
      <div class="burger" id="openMenu" aria-label="メニューを開く">☰ メニュー</div>
      <a class="reserve" href="search.html">ご予約</a>
    </div>
  </header>

  <main id="main" class="container" tabindex="-1">
    <div class="breadcrumbs">
      <a href="top.html">ホーム</a><span>›</span><a href="search.html">空室検索</a><span>›</span><span>予約</span>
    </div>

    <div class="detail-layout">
      <section class="detail-main">
        <h2 style="margin:0 0 6px">予約情報の入力</h2>
        <p class="lead" style="margin:0 0 16px">予約確定時に、空室を再確認してからINSERTします。</p>

        <form id="bookingForm" class="box">
          <div class="form-grid" style="grid-template-columns:1fr 1fr 1fr 1fr; gap:12px">
            <div>
              <label for="checkin">チェックイン</label>
              <input id="checkin" name="checkin" type="text" autocomplete="off">
            </div>
            <div>
              <label for="checkout">チェックアウト</label>
              <input id="checkout" name="checkout" type="text" autocomplete="off">
            </div>
            <div>
              <label>ご宿泊人数</label>
              <select name="guests">
                <option value="1">1</option><option value="2" selected>2</option>
                <option value="3">3</option><option value="4">4</option>
              </select>
            </div>
            <div>
              <label>お部屋タイプ</label>
              <input type="text" value="（URLで指定）" disabled>
            </div>
          </div>

          <hr>

          <div class="form-grid" style="grid-template-columns:1fr 1fr 1fr; gap:12px">
            <div>
              <label>お名前</label>
              <input name="guest_name" placeholder="例：佐々木 祥太" required>
            </div>
            <div>
              <label>メール</label>
              <input name="email" type="email" placeholder="example@example.com" required>
            </div>
            <div>
              <label>電話（任意）</label>
              <input name="phone" placeholder="090-xxxx-xxxx">
            </div>
          </div>

          <div style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap; align-items:center">
            <button class="btn-primary" type="submit" style="width:auto; min-width:220px">予約を確定</button>
            <div id="msg" class="note"></div>
          </div>

          <div class="note" style="margin-top:10px">※ 学習用デモ：実決済や本人確認は行いません。</div>
        </form>
      </section>

      <aside class="sticky-box">
        <div class="box">
          <h3 style="margin:0 0 6px">ご予約内容</h3>
          <div style="display:flex; justify-content:space-between; gap:10px">
            <div id="roomTitle" style="font-weight:800">—</div>
            <div id="nights" class="note">—</div>
          </div>
          <div id="dateRange" class="note" style="margin-top:4px">—</div>
          <hr>
          <div style="display:flex; justify-content:space-between; gap:10px">
            <div class="note">料金</div><div id="price" style="font-weight:700">—</div>
          </div>
          <div style="display:flex; justify-content:space-between; gap:10px; margin-top:6px">
            <div class="note">合計</div><div id="total" class="price">—</div>
          </div>
        </div>

        <div class="box">
          <h3 style="margin:0 0 6px">注意事項</h3>
          <ul style="margin:0 0 0 1.2rem; color:var(--muted)">
            <li>予約確定時に空室状況が変わる場合があります</li>
            <li>チェックアウト日は宿泊に含みません（一般的なホテルの扱い）</li>
          </ul>
        </div>
      </aside>
    </div>
  </main>

  <footer>
    <div class="container">© <span id="y"></span> HOTEL AURELIA TOKYO — 学習用デモサイト</div>
  </footer>

  <!-- Mobile drawer -->
  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="drawer" role="dialog" aria-label="モバイルメニュー">
      <a href="top.html#rooms">客室・スイート</a>
      <a href="top.html#dining">ダイニング</a>
      <a href="top.html#spa">スパ</a>
      <a href="top.html#access">アクセス</a>
      <a class="reserve" href="search.html">ご予約</a>
    </div>
  </div>

  <script src="assets/data.js"></script>
  <script src="assets/common.js"></script>
  <script src="assets/booking.js"></script>
</body>
</html>
